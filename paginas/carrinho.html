<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateliê odé - Carrinho</title>

    <!--LINK PARA ADICIONAE O FAVICON-->
    <link rel="shortcut icon" href="../imagem/icones/favicon.ico" type="imagem/x-icon">

    <!--LINK PARA O ARQUIVO-->
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_carrinho.css">

    <script src="../js/monta_tela_carrinho.js" type="module" defer></script>
    
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../imagem/icones/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu">Home</a></li>
                    <li><a href="cadastro.html" class="lnk_menu">Cadastro</a></li>
                    <li><a href="sobre.html" class="lnk_menu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
              <ul>
                <li><a href="login.html" class="lnk-icone"><img src="../imagem/icones/login.png" alt="Login"></a></li>
                <li><a href="carrinho.html" class="lnk-icone"><img src="../imagem/icones/carrinho.png" alt="Carrinho"></a></li>
              </ul>
            </div>
        </header>

        <section id="carrinho-topo">
            <h3>Carrinho de Compras</h3>
        </section>

        <section id="carrinho-conteudo">
            <div id="lista-itens">
                <!-- Preenchido dinamicamente por js/carrinho.js -->
            </div>

            <aside id="resumo-carrinho">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep" placeholder="Digite o CEP">

                <div class="resumo-linha valor-total-box">
                    <span>VALOR TOTAL</span>
                    <strong id="valor-total">R$ 0,00</strong>
                </div>

                <div class="resumo-linha valor-frete-box">
                    <span>VALOR FRETE</span>
                    <strong id="valor-frete">R$ 0,00</strong>
                </div>

                <div class="resumo-linha total-pagar-box">
                    <span>TOTAL A PAGAR</span>
                    <strong id="total-pagar">R$ 0,00</strong>
                </div>

                <button type="button" id="btn-continuar">Continuar Compra</button>
                <button type="button" id="btn-finalizar">Finalizar Compra</button>
            </aside>
        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua Baixa da Cachorrinha, 88 - Siqueira Campos</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https://www.instagram.com/seu_usario"><img src="../imagem/icones/instagram.png" alt="Instagram"></a></li>
                    <li><a href="https://www.x.com/seu_usario"><img src="../imagem/icones/x.png" alt="X"></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../imagem/icones/hipercard.png" alt="Hipercard">
                <img src="../imagem/icones/visa.png" alt="Visa">
                <img src="../imagem/icones/master_card.png" alt="Mastercard">
            </div>
        </footer>

    </main>

    <script src="../js/carrinho.js" type="module" defer></script>
</body>
</html>
